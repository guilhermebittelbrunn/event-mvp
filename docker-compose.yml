services:
  api:
    image: guilhermebittelbrunn/event-mvp:latest
    ports:
      - "80:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${PORT}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_VOLUME_PATH=${POSTGRES_VOLUME_PATH}
      - POSTGRES_URL=${POSTGRES_URL}
      - AWS_S3_KEY=${AWS_S3_KEY}
      - AWS_S3_SECRET=${AWS_S3_SECRET}
      - AWS_S3_REGION=${AWS_S3_REGION}
      - AWS_S3_ASSETS_BUCKET=${AWS_S3_ASSETS_BUCKET}
      - NEW_RELIC_APP_NAME=${NEW_RELIC_APP_NAME}
      - NEW_RELIC_LICENSE_KEY=${NEW_RELIC_LICENSE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EVENT_SECRET=${JWT_EVENT_SECRET}
      - CRYPTO_KEY=${CRYPTO_KEY}
      - SUCCESS_EVENT_PAYMENT_URL=${SUCCESS_EVENT_PAYMENT_URL}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}