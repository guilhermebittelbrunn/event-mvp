name: 'Production - Deploy (Hostinger) [M]'

on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - main

jobs:
  docker_build_push:
    runs-on: ubuntu-latest
    environment: event-mvp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{secrets.DOCKERHUB_USERNAME}}/event-mvp:latest
  deploy:
    runs-on: ubuntu-latest
    needs: docker_build_push
    environment: event-mvp

    steps:
      - uses: actions/checkout@v4

      - name: Declare some variables
        id: vars
        shell: bash
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Deploy to Hostinger VPS
        uses: hostinger/deploy-on-vps@v2
        with:
          api-key: ${{ secrets.HOSTINGER_API_KEY }}
          virtual-machine: ${{ vars.HOSTINGER_VM_ID }}
          docker-compose-path: docker-compose.yml
          # environment-variables: |   
          #   NODE_ENV=production
